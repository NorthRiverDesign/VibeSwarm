name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore VibeSwarm.sln --nologo

      - name: Analyze
        run: dotnet format analyzers VibeSwarm.sln --no-restore --verify-no-changes --verbosity minimal

      - name: Build
        run: dotnet build VibeSwarm.sln --configuration Release --no-restore --nologo -warnaserror

      - name: Test
        run: dotnet test VibeSwarm.sln --configuration Release --no-build --nologo --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
